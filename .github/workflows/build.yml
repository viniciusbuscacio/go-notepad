name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: go test
        run: go test ./internal/...

  build:
    name: build (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: go run ./tools/build

      # upload-artifact zips plain files and drops the executable bits, which
      # breaks the .app bundle; ditto (same as release.yml) preserves them, so
      # on macOS we zip first and upload that.
      - name: Zip .app (macOS)
        if: matrix.name == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent build/bin/go-notepad.app go-notepad-macos.zip

      - name: Upload artifact (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: go-notepad-macos
          path: go-notepad-macos.zip
          if-no-files-found: warn

      - name: Upload artifact
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: go-notepad-${{ matrix.name }}
          path: build/bin/*
          if-no-files-found: warn
