<!-- Source of the app icon. Lucide "notepad-text" glyph (ISC licence, lucide.dev)
     in WHITE stroke on a rounded dark tile, near full-bleed so it stays legible
     at taskbar sizes. Regenerate build/appicon.png (1024x1024) and the
     multi-size build/windows/icon.ico by rendering this SVG at each target
     size (sharp + png-to-ico works; or rsvg-convert for the png alone). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#363b43" />
      <stop offset="1" stop-color="#1e222a" />
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="200" fill="url(#bg)" />
  <g transform="translate(104 104) scale(34)" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 2v4" />
    <path d="M12 2v4" />
    <path d="M16 2v4" />
    <rect width="16" height="18" x="4" y="4" rx="2" />
    <path d="M8 10h6" />
    <path d="M8 14h8" />
    <path d="M8 18h5" />
  </g>
</svg>
