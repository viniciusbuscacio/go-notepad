<?xml version="1.0" encoding="UTF-8"?>
<!-- Source artwork for appicon.png: a black rounded plate (same geometry as
     go-calc's icon, so the two apps read as one family) carrying the note
     glyph — a spiral-bound pad with a short title line and two body lines.
     appicon.png (1024x1024) was generated by compositing the original glyph
     bitmap onto the plate; this file mirrors that design as an editable
     vector, e.g.:
       rsvg-convert -w 1024 -h 1024 build/appicon-source.svg -o build/appicon.png -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- plate -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="#121212"/>
  <g stroke="#ffffff" stroke-width="64" fill="none" stroke-linecap="round">
    <!-- pad body -->
    <rect x="272" y="260" width="480" height="520" rx="62"/>
    <!-- spiral binding piercing the top edge -->
    <line x1="395" y1="228" x2="395" y2="325"/>
    <line x1="512" y1="228" x2="512" y2="325"/>
    <line x1="629" y1="228" x2="629" y2="325"/>
  </g>
  <g stroke="#ffffff" stroke-width="35" fill="none" stroke-linecap="round">
    <!-- title line + two body lines (lighter than the frame) -->
    <line x1="400" y1="443" x2="502" y2="443"/>
    <line x1="400" y1="547" x2="633" y2="547"/>
    <line x1="400" y1="649" x2="633" y2="649"/>
  </g>
</svg>
